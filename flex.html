<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Practice</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-10 space-y-10">

  <!-- 1. Basic Flex -->
  <div class="flex bg-gray-200 p-4 gap-2">
    <div class="bg-red-300 p-4">1</div>
    <div class="bg-blue-300 p-4">2</div>
    <div class="bg-green-300 p-4">3</div>
  </div>

  <hr>

  <!-- 2. Direction -->
  <div class="flex flex-col bg-yellow-200 p-4 gap-2">
    <div class="bg-red-300 p-4">Column 1</div>
    <div class="bg-blue-300 p-4">Column 2</div>
  </div>

  <hr>

  <!-- 3. Justify (Main Axis) -->
  <div class="flex justify-between bg-purple-200 p-4">
    <div class="bg-red-300 p-4">1</div>
    <div class="bg-blue-300 p-4">2</div>
    <div class="bg-green-300 p-4">3</div>
  </div>

  <hr>

  <!-- 4. Align Items (Cross Axis) -->
  <div class="flex items-center h-62 bg-pink-200 gap-2">
    <div class="bg-red-300 p-4">1</div>
    <div class="bg-blue-300 p-8">2</div>
    <div class="bg-green-300 p-2">3</div>
  </div>

  <hr>

  <!-- 5. Center Everything -->
  <div class="flex justify-center items-center h-32 bg-green-200">
    <div class="bg-black text-white p-4">Centered</div>
  </div>

  <hr>

  <!-- 6. Gap -->
  <div class="flex gap-6 bg-blue-200 p-4">
    <div class="bg-red-300 p-4">1</div>
    <div class="bg-blue-300 p-4">2</div>
  </div>

  <hr>

  <!-- 7. Flex Wrap -->
  <div class="flex flex-wrap gap-2 bg-gray-200 p-4">
    <div class="bg-red-300 p-4 w-40">1</div>
    <div class="bg-blue-300 p-4 w-40">2</div>
    <div class="bg-green-300 p-4 w-40">3</div>
    <div class="bg-yellow-300 p-4 w-40">4</div>
  </div>

  <hr>

  <!-- 8. Flex Grow -->
  <div class="flex bg-purple-200 p-4 gap-2">
    <div class="bg-red-300 p-4 flex-1">flex-1</div>
    <div class="bg-blue-300 p-4 flex-1">flex-1</div>
    <div class="bg-green-300 p-4">normal</div>
  </div>

  <hr>

  <!-- 9. Flex Shrink -->
  <div class="flex w-60 bg-yellow-200 p-4 gap-2">
    <div class="bg-red-300 p-4 w-40 shrink-0">no shrink</div>
    <div class="bg-blue-300 p-4 w-40">shrink</div>
  </div>

  <hr>

  <!-- 10. Flex Basis -->
  <div class="flex bg-pink-200 p-4 gap-2">
    <div class="bg-red-300 basis-1/4 p-4">25%</div>
    <div class="bg-blue-300 basis-1/2 p-4">50%</div>
  </div>

  <hr>

  <!-- 11. Order -->
  <div class="flex bg-green-200 p-4 gap-2">
    <div class="bg-red-300 p-4 order-3">1</div>
    <div class="bg-blue-300 p-4 order-1">2</div>
    <div class="bg-yellow-300 p-4 order-2">3</div>
  </div>

  <hr>

  <!-- 12. Self Alignment -->
  <div class="flex h-32 bg-blue-200 p-4 gap-2">
    <div class="bg-red-300 p-4 self-start">start</div>
    <div class="bg-blue-300 p-4 self-center">center</div>
    <div class="bg-green-300 p-4 self-end">end</div>
  </div>

  <hr>

  <!-- 13. Responsive Flex -->
  <div class="flex flex-col md:flex-row gap-2 bg-gray-300 p-4">
    <div class="bg-red-300 p-4">1</div>
    <div class="bg-blue-300 p-4">2</div>
  </div>

</body>
</html>

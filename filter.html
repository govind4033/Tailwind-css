<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Practice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-10 space-y-6">

    <!-- Base image -->
    <img src="assets/laundary.png" class="w-64">

    <hr>

    <!-- Blur -->
    <img src="assets/laundary.png" class="w-64 blur-sm">
    <img src="assets/laundary.png" class="w-64 blur-md">
    <img src="assets/laundary.png" class="w-64 blur-lg">

    <hr>

    <!-- Brightness -->
    <img src="assets/laundary.png" class="w-64 brightness-50">
    <img src="assets/laundary.png" class="w-64 brightness-100">
    <img src="assets/laundary.png" class="w-64 brightness-150">

    <hr>

    <!-- Contrast -->
    <img src="assets/laundary.png" class="w-64 contrast-50">
    <img src="assets/laundary.png" class="w-64 contrast-100">
    <img src="assets/laundary.png" class="w-64 contrast-150">

    <hr>

    <!-- Grayscale -->
    <img src="assets/laundary.png" class="w-64 grayscale">
    <img src="assets/laundary.png" class="w-64 grayscale-75">
    <img src="assets/laundary.png" class="w-64 grayscale-25">

    <hr>

    <!-- Sepia -->
    <img src="assets/laundary.png" class="w-64 sepia">
    <img src="assets/laundary.png" class="w-64 sepia-0">

    <hr>

    <!-- Saturate -->
    <img src="assets/laundary.png" class="w-64 saturate-50">
    <img src="assets/laundary.png" class="w-64 saturate-100">
    <img src="assets/laundary.png" class="w-64 saturate-200">

    <hr>

    <!-- Hue Rotate -->
    <img src="assets/laundary.png" class="w-64 hue-rotate-0">
    <img src="assets/laundary.png" class="w-64 hue-rotate-90">
    <img src="assets/laundary.png" class="w-64 hue-rotate-180">

    <hr>

    <!-- Invert -->
    <img src="assets/laundary.png" class="w-64 invert">
    <img src="assets/laundary.png" class="w-64 invert-0">

    <hr>

    <!-- Drop Shadow -->
    <img src="assets/laundary.png" class="w-64 drop-shadow-sm">
    <img src="assets/laundary.png" class="w-64 drop-shadow-lg">

    <hr>

    <!-- Multiple Filters Combined -->
    <img src="assets/laundary.png" 
         class="w-64 blur-sm brightness-125 contrast-125 saturate-150">

    <hr>

    <!-- Hover Effect -->
    <img src="assets/laundary.png" 
         class="w-64 grayscale hover:grayscale-0 transition duration-300">

    <hr>

    <!-- Custom Value -->
    <img src="assets/laundary.png" 
         class="w-64 blur-[3px] brightness-[1.3] contrast-[1.2]">

</body>
</html>
